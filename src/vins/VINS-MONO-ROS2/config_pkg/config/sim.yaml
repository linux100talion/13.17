%YAML:1.0

# ============================================================================
# VINS-Mono — конфиг для СИМУЛЯЦИИ (Gazebo Harmonic + ArduPilot SITL).
#
# Отличия от боевого dummy_13_7.yaml:
#   - Дисторсия НУЛЕВАЯ: Gazebo-камера — идеальный pinhole, линзовых искажений нет.
#   - Интринсики посчитаны из model.sdf: horizontal_fov=1.5708 (90°), 1280x720.
#       fx = fy = (width/2)/tan(fov/2) = 640/tan(45°) = 640
#       cx = width/2 = 640,  cy = height/2 = 360
#   - Пути: контейнер nav использует /root/sim_ws/ (а не /root/vins_ws/).
#   - Экстринсики камера<->IMU взяты из позы камеры в model.sdf.
#   - Шум IMU: в симуляции нет вибраций рамы, значения занижены относительно боевых.
#
# ВАЖНО: разрешение здесь (1280x720) должно совпадать с разрешением камеры в
# Gazebo (model.sdf) И с width_/height_ в camera_node. См. docker/sim/README.md.
# ============================================================================

# Основные пути и топики
imu_topic: "/mavros/imu/data_raw"
image_topic: "/image_mono"
output_path: "/root/sim_ws/output/"
vins_folder: "/root/sim_ws/src/vins/VINS-MONO-ROS2/config_pkg/"

# Камера
model_type: "PINHOLE"
camera_name: "camera"
image_width: 1280
image_height: 720
num_of_cam: 1

# Gazebo-камера — идеальный pinhole, дисторсии нет.
distortion_parameters:
   k1: 0.0
   k2: 0.0
   p1: 0.0
   p2: 0.0

# Из horizontal_fov=1.5708 (90°) при 1280x720.
projection_parameters:
   fx: 640.0
   fy: 640.0
   cx: 640.0
   cy: 360.0


# Временная задержка камера<->IMU.
# В симуляции оба источника штампуются sim-clock'ом → td=0, оценку отключаем.
estimate_td: 0
td: 0.0

# Экстринсики (смещение IMU <-> Камера).
# estimate_extrinsic: 0 — фиксированный (не оцениваем онлайн).
# В этом форке VINS: 0=fix, 1=optimize around initial guess, 2=no prior/calibrate.
#
# Конвенция: RIC — матрица поворота из тела (FLU: X вперёд, Y влево, Z вверх)
# в camera-optical frame (Z вперёд в сцену, X вправо в кадре, Y вниз).
# Камера в Gazebo смотрит вдоль +X camera_link (Classic-конвенция).
# Вправо в кадре = -Y_link (Y_link = Y_body = влево), вниз = -Z_link.
# Поза SDF: pitch=0.26 рад → X_link=[cos,0,-sin], Z_link=[sin,0,cos] в теле.
#
#   X_cam (вправо) = -Y_link = [0, -1, 0]
#   Y_cam (вниз)   = -Z_link = [-sin(0.26), 0, -cos(0.26)] = [-0.257, 0, -0.966]
#   Z_cam (вперёд) = +X_link = [cos(0.26), 0, -sin(0.26)] = [0.966, 0, -0.257]
#
# Проверка: RIC * g_body = RIC * [0,0,-9.81] = [0, 9.48, 2.52] — гравитация
# указывает в +Y_cam (вниз в кадре), и чуть +Z_cam (вперёд, т.к. наклон 15°). ✓
estimate_extrinsic: 0
ex_calib_result_path: "/root/sim_ws/output/extrinsic.yaml"

extrinsicRotation: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [0, -1, 0,
          -0.25708, 0, -0.96639,
          0.96639, 0, -0.25708]

# Из позы камеры в model.sdf: pose="0.15 0 0.05 ..." => [X, Y, Z] в теле FLU.
extrinsicTranslation: !!opencv-matrix
   rows: 3
   cols: 1
   dt: d
   data: [0.15, 0.0, 0.05]

# Настройки трекера фич
max_cnt: 150
min_dist: 30
freq: 10
F_threshold: 1.0
show_track: 1
equalize: 1
fisheye: 0
flow_back: 1

# Параметры шума IMU.
# В симуляции нет вибраций рамы, поэтому значения acc_n/gyr_n возвращены к
# базовым (в боевом конфиге они были подняты ~в 10 раз под вибрации). При
# расхождении VINS на старте — подстрой под модель IMU из ardupilot_gazebo.
acc_n: 0.08        # физически верно: нет вибраций рамы в sim (check2 был из-за ill-conditioned cov, не из-за acc_n)
gyr_n: 0.004
acc_w: 0.0004
gyr_w: 2.0e-5
g_norm: 9.81
