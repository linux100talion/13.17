version: '3.8'

services:
  vins_core:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: vins_project_13_7
    restart: unless-stopped
    
    # КРИТИЧНО ДЛЯ ROS 2:
    # network_mode: host убирает изоляцию сети. 
    # Контейнер получает прямой доступ к Wi-Fi адаптеру дрона и DDS мультикасту.
    network_mode: host
    ipc: host
    pid: host
    
    # Проброс камеры ArduCam
    devices:
      - /dev/video0:/dev/video0
    
    # Даем права для работы с видеоустройствами
    privileged: true
    runtime: nvidia

    # Монтируем исходники. build/ и install/ не монтируем —
    # собираются внутри контейнера через colcon build.
    volumes:
      - ../../src/vins:/root/vins_ws/src/vins
      - ../../src/camera:/root/vins_ws/src/camera
      - ../../src/nav:/root/vins_ws/src/nav
      - ./output:/root/vins_ws/output