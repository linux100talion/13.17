# ============================================================================
# mavlink-router: единая точка раздачи MAVLink-телеметрии в симуляции.
#
# ArduPilot SITL поднимает TCP-сервер на 127.0.0.1:5760.
# mavlink-router подключается к нему КЛИЕНТОМ и раздаёт всем потребителям по UDP,
# чтобы MAVROS, QGroundControl и кастомные ноды не дрались за один порт.
#
#   SITL (tcp:5760) --> mavlink-router --> UDP 14550 (QGC)
#                                      --> UDP 14540 (MAVROS)
#                                      --> UDP 14541 (кастомный C++/Python узел)
# ============================================================================

[General]
TcpServerPort=0
ReportStats=false
MavlinkDialect=ardupilotmega

# --- Источник: ArduPilot SITL (подключаемся клиентом к его TCP-серверу) ---
[TcpEndpoint sitl]
Mode=Client
Address=127.0.0.1
Port=5760

# --- Потребитель: QGroundControl ---
[UdpEndpoint qgc]
Mode=Normal
Address=127.0.0.1
Port=14550

# --- Потребитель: MAVROS (контейнер nav) ---
# В MAVROS укажи fcu_url:=udp://:14540@127.0.0.1:14555
[UdpEndpoint mavros]
Mode=Normal
Address=127.0.0.1
Port=14540

# --- Потребитель: кастомный узел (orin_shutdown / прямые MAVLink-команды) ---
[UdpEndpoint cpp_node]
Mode=Normal
Address=127.0.0.1
Port=14541
