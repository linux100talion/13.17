version: '3.8'

# ============================================================================
# Симуляционный стек: ArduPilot SITL + Gazebo Harmonic + VINS/Nav
# Запускается на x86 ноутбуке с NVIDIA GPU.
# Реальное железо (камера, полётник) НЕ требуется — всё эмулируется.
#
# Перед запуском на хосте:
#   xhost +local:root        # разрешить контейнеру доступ к X11
#   export DISPLAY=:0
# ============================================================================

services:

  # 1. СИМУЛЯТОР: Gazebo Harmonic (рендер мира + физика) + ArduPilot SITL (полётник)
  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: p1317_simulator
    restart: unless-stopped

    # host-сеть: SITL отдаёт MAVLink на TCP 127.0.0.1:5760,
    # Gazebo<->ROS мост работает по DDS без NAT.
    network_mode: host
    ipc: host

    # GPU нужен Gazebo для аппаратного рендера через EGL (headless) или X11 (GUI).
    # Headless (bag-коллекция): DISPLAY не нужен, gz sim --headless-rendering.
    # GUI (локальный ноут): раскомментировать DISPLAY + volume /tmp/.X11-unix
    #   и выполнить на хосте: xhost +local:root
    runtime: nvidia
    environment:
      # - DISPLAY=${DISPLAY}               # раскомментировать для GUI-режима
      # - QT_X11_NO_MITSHM=1              # раскомментировать для GUI-режима
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all      # graphics+compute: нужно для EGL/рендера
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # Разрешение камеры — из env хоста (default 1280×720, боевой ArduCam).
      # Применяется при СОЗДАНИИ контейнера → менять только через up/fresh-start.
      - CAMERA_W=${CAMERA_W:-1280}
      - CAMERA_H=${CAMERA_H:-720}

    volumes:
      # - /tmp/.X11-unix:/tmp/.X11-unix:rw  # раскомментировать для GUI-режима
      - ./worlds:/root/worlds:rw            # SDF-миры и модели дрона
      - ./output:/root/output:rw
      - ./scripts:/scripts:ro               # sim_up.sh запускается автоматически
      - ./config/sitl-extra.parm:/root/sitl-extra.parm:ro  # доп. параметры SITL

    # sim_up.sh стартует Gazebo+SITL+bridge в фоне, потом tail держит контейнер.
    # Итерация без пересоздания: docker compose stop && docker compose start
    command: bash -c "bash /scripts/sim_up.sh; exec tail -f /dev/null"

  # 2. РОУТЕР MAVLINK: разводит телеметрию SITL между MAVROS, QGC и кастомными нодами.
  mavlink_router:
    build:
      context: ./mavlink_router
      dockerfile: Dockerfile
    container_name: p1317_mavlink_router
    restart: unless-stopped
    network_mode: host
    depends_on:
      - simulator
    volumes:
      - ./config/mavlink-router.conf:/etc/mavlink-router/main.conf:ro

  # 3. МОЗГ: VINS-Mono + нейросети навигации (CUDA). Камеру берёт из Gazebo-топика.
  nav:
    build:
      context: ../..                        # корень репо: нужен доступ к src/
      dockerfile: docker/sim/nav/Dockerfile
    container_name: p1317_nav
    restart: unless-stopped
    network_mode: host
    ipc: host

    # GPU для нейросетей И для CUDA-дебайеризации камеры-ноды (cv::cuda).
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      # Разрешение камеры — из env хоста (default 1280×720). ДОЛЖНО совпадать с
      # simulator. Применяется при СОЗДАНИИ контейнера → менять через up/fresh-start.
      - CAMERA_W=${CAMERA_W:-1280}
      - CAMERA_H=${CAMERA_H:-720}

    # Виртуальная камера: байеризатор пишет сюда, camera_node читает отсюда.
    # /dev/rawbayer создаётся на ХОСТЕ модулем v4l2loopback (см. README).
    devices:
      - /dev/rawbayer:/dev/rawbayer

    # Монтируем исходники. build/ и install/ собираются внутри через colcon.
    # camera_pkg ТЕПЕРЬ монтируем — в симуляции нода работает "как есть",
    # читая Bayer-кадры из /dev/rawbayer вместо реального /dev/video0.
    depends_on:
      - simulator

    volumes:
      - ../../src/vins:/root/sim_ws/src/vins
      - /root/VINS-MONO-ROS2:/root/sim_ws/src/vins_oss  # форк linux100talion/VINS-MONO-ROS2, ветка 1317_debug
      - ../../src/sim:/root/sim_ws/src/sim       # симуляционная обвязка
      - ../../src/nav:/root/sim_ws/src/nav       # нейросети навигации (пока пусто)
      - ../../src/lab:/lab:ro                    # управляющие скрипты (arm/fly/land/vins_watch)
      - ../../src/camera:/root/sim_ws/src/camera
      - nav_colcon_build:/root/sim_ws/build      # colcon build — выживает при fresh-start
      - nav_colcon_install:/root/sim_ws/install  # colcon install — выживает при fresh-start
      - ./output:/root/sim_ws/output
      - ./scripts:/scripts:ro                    # nav_up.sh запускается автоматически

    # nav_up.sh: colcon build (если нет) + bayerizer + VINS launch + MAVROS.
    # Итерация без пересоздания: docker compose stop && docker compose start
    command: bash -c "bash /scripts/nav_up.sh; exec tail -f /dev/null"

volumes:
  nav_colcon_build:   # colcon build artifacts (build/): выживают при fresh-start, сносятся make clean
  nav_colcon_install: # colcon install artifacts (install/): аналогично
